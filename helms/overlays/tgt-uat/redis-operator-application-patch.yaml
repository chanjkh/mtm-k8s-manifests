- op: replace
  path: /spec/destination/server
  value: https://kubernetes.default.svc    # needs to be updated to correct k8s server
  target:
    kind: Application
    name: redis-operator-application

- op: replace
  path: /spec/destination/namespace
  value: mtm-tgt-uat
  target:
    kind: Application
    name: redis-operator-application

- op: replace
  path: /spec/project
  value: mtm-tgt-uat-project
  target:
    kind: Application
    name: redis-operator-application

- op: replace
  path: /metadata/name
  value: mtm-tgt-uat-redis-operator-application
  target:
    kind: Application
    name: redis-operator-application

- op: replace
  path: /spec/sources/0/helm/values
  value: |
    installCRDs: true
    serviceAccountName: "mtm-tgt-uat-redis-operator"
    redisOperator:
      name: "mtm-tgt-uat-redis-operator"
  target:
    kind: Application
    name: redis-operator-application