apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - path: redis-operator-application-patch.yaml
    target:
      kind: Application
      name: redis-operator-application
  - path: airflow-application-patch.yaml
    target:
      kind: Application
      name: airflow-application