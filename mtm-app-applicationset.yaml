apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: mtm-app-applicationset
  namespace: argocd                                         # always deploy Argo CD appsets into argocd namespace
spec:
  generators:
    - git:
        repoURL: https://github.com/chanjkh/mtm-k8s-manifests.git
        revision: HEAD
        directories:
          - path: apps/*/overlays/*              # only create Applications for overlays that exist in Git
  template:
    metadata:
      name: "mtm-{{path.basename}}-{{path[1]}}-application"
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: "mtm-{{path.basename}}-project"
      source:
        repoURL: https://github.com/chanjkh/mtm-k8s-manifests.git
        targetRevision: HEAD
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc    # needs to be updated to correct k8s server
        namespace: "mtm-{{path.basename}}"
      syncPolicy:
        automated:
          prune: true                                       # delete resources removed from Git
          selfHeal: true                                    # auto-revert manual changes in the cluster
        syncOptions:
          - CreateNamespace=true                            # create namespace if not exists
          - ServerSideApply=true                            # required for applying large CRDs without annotation size limit issues
          - RespectIgnoreDifferences=true
        retry:
          limit: 3
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 1m
      ignoreDifferences:
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          jsonPointers:
            - /spec/preserveUnknownFields                   # ignore CRD fields managed by the operator itself