apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: mtm-helm-applicationset
  namespace: argocd                                       # always deploy Argo CD appsets into argocd namespace
spec:
  generators:
    - list:
        elements:
          - env: vtg-uat
            app: mtm
            server: https://kubernetes.default.svc        # needs to be updated to correct k8s server
          - env: tgt-uat
            app: mtm
            server: https://kubernetes.default.svc        # needs to be updated to correct k8s server
  template:
    metadata:
      name: "{{app}}-{{env}}-redis-operator-application"
      namespace: argocd                                   # always deploy Argo CD apps into argocd namespace
      finalizers:
        - resources-finalizer.argocd.argoproj.io          # cascade delete managed resources on app removal
    spec:
      project: "{{app}}-{{env}}-project"
      sources:
        - repoURL: https://ot-container-kit.github.io/helm-charts/
          chart: redis-operator
          targetRevision: 0.23.0                            # pin to a specific version, avoid using "*" in production
          helm:
            releaseName: redis-operator
            values: |
              installCRDs: true                             # ensure CRDs are installed automatically
              serviceAccountName: "{{app}}-{{env}}-redis-operator"
              redisOperator:
                name: "{{app}}-{{env}}-redis-operator"      # rename ClusterRole to support deploying multiple operators in one cluster
      destination:
        server: "{{server}}"
        namespace: "{{app}}-{{env}}"
      syncPolicy:
        automated:
          prune: true                                     # delete resources removed from Git
          selfHeal: true                                  # auto-revert manual changes in the cluster
        syncOptions:
          - CreateNamespace=true                          # create namespace if not exists
          - ServerSideApply=true                          # required for applying large CRDs without annotation size limit issues
          - RespectIgnoreDifferences=true
        retry:
          limit: 3
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 1m
      ignoreDifferences:
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          jsonPointers:
            - /spec/preserveUnknownFields                 # ignore CRD fields managed by the operator itself