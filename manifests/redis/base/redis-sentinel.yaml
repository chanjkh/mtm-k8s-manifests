apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisSentinel
metadata:
  name: redis-sentinel
  namespace: NAMESPACE_PLACEHOLDER            # patched per environment
spec:
  clusterSize: 3
  kubernetesConfig:
    image: quay.io/opstree/redis-sentinel:v8.4.0
    imagePullPolicy: IfNotPresent
  redisSentinelConfig:
    redisReplicationName: redis-replication   # must match RedisReplication name above
    masterGroupName: "mtm2-master"            # set your custom master name here
    failoverTimeout: "10000"
    downAfterMilliseconds: "5000"
    redisReplicationPassword:
      secretKeyRef:
        name: mtm2-redis-creds
        key: REDIS_PASSWORD
  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000