apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-application
  namespace: argocd                          # always deploy Argo CD apps into argocd namespace
  finalizers:
    - resources-finalizer.argocd.argoproj.io # cascade delete managed resources on app removal
spec:
  project: default
  sources:
    - repoURL: https://ot-container-kit.github.io/helm-charts/
      chart: redis-operator
      targetRevision: 0.23.0                 # pin to a specific version, avoid using "*" in production
      helm:
        releaseName: redis-operator
        values: |
          installCRDs: true                  # ensure CRDs are installed automatically
    - repoURL: https://github.com/chanjkh/mtm-k8s-manifests.git
      targetRevision: HEAD
      path: PATH_PLACEHOLDER                 # patched per environment
      directory:
        recurse: true
  destination:
    server: SERVER_PLACEHOLDER               # patched per environment
    namespace: NAMESPACE_PLACEHOLDER         # patched per environment
  syncPolicy:
    automated:
      prune: true                            # delete resources removed from Git
      selfHeal: true                         # auto-revert manual changes in the cluster
    syncOptions:
      - CreateNamespace=true                 # create namespace if not exists
      - ServerSideApply=true                 # required for applying large CRDs without annotation size limit issues
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 1m
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/preserveUnknownFields        # ignore CRD fields managed by the operator itself