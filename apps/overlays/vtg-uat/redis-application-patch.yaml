- op: replace
  path: /spec/sources/1/path
  value: manifests/redis/overlays/vtg-uat
  target:
    kind: Application
    name: redis-application

- op: replace
  path: /spec/destination/server
  value: https://kubernetes.default.svc    # needs to be updated to correct k8s server
  target:
    kind: Application
    name: redis-application

- op: replace
