apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mtm-vtg-uat-application
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/chanjkh/mtm-k8s-manifests.git
    targetRevision: main
    path: apps/overlays/vtg-uat              # points to the App of Apps overlay
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true